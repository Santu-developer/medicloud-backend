############################
# LOGGING
############################
logging.level.root=INFO
logging.level.org.springframework.security=WARN

############################
# JWT CONFIG
# PRODUCTION: Use environment variables -> ${JWT_SECRET}
############################
jwt.secret=medicloud-super-secret-key-for-jwt-signing-2026-extra-long-padding-for-hmac-sha256
jwt.expiration=86400000

############################
# SERVER CONFIG
############################
server.port=8080
spring.application.name=medicloud-backend

############################
# MYSQL DATABASE
# PRODUCTION: Use env vars -> ${DB_URL}, ${DB_USERNAME}, ${DB_PASSWORD}
# PRODUCTION: Enable SSL -> useSSL=true&requireSSL=true
############################
spring.datasource.url=jdbc:mysql://localhost:3306/medicloud_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################
# JPA + HIBERNATE
############################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

############################
# CONNECTION POOL (HIKARI)
############################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool

############################
# ACTUATOR SECURITY
############################
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

############################
# SPRINGDOC / SWAGGER UI
############################
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.doc-expansion=none
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
